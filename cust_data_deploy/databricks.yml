# This is a Databricks asset bundle definition for cust_data_deploy.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: cust_data_deploy
  uuid: 2e90c616-1bb6-46d6-9b54-fe12e538d752

include:
  - resources/*.yml


# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets: 
      name_prefix: dev_${workspace.current_user.short_name}_
      source_linked_deployment: false
    workspace:
      host: https://dbc-af8da38e-ae0f.cloud.databricks.com
    variables:
      catalog: customer_data_analytics
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-af8da38e-ae0f.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/adeolaayandeyi@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/adeolaayandeyi@gmail.com/CUST_ANAL_PROD/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: customer_data_analytics
      schema: prod
    permissions:
      - user_name: adeolaayandeyi@gmail.com
        level: CAN_MANAGE
